<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Salon ERP - Single File (UPI Reminders)</title>
<style>
  :root{--accent:#d6336c;--muted:#666;--bg:#f7f7fb}
  body{font-family:Inter,Segoe UI,Arial;background:var(--bg);margin:0;color:#222}
  header{background:#fff;padding:12px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #e6e6ee}
  header h1{font-size:18px;margin:0}
  .container{display:flex;gap:18px;padding:18px}
  nav{width:240px;background:#fff;padding:12px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
  main{flex:1}
  .menu button{display:block;width:100%;margin:6px 0;padding:10px;border:0;background:transparent;text-align:left;border-radius:6px;cursor:pointer}
  .card{background:#fff;padding:12px;border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,.04);margin-bottom:12px}
  table{width:100%;border-collapse:collapse}
  th,td{padding:8px;border-bottom:1px solid #f0f0f5;text-align:left;font-size:13px}
  .muted{color:var(--muted);font-size:13px}
  .btn{background:var(--accent);color:#fff;padding:8px 10px;border-radius:6px;border:0;cursor:pointer}
  input,select,textarea{padding:8px;border:1px solid #e6e6ee;border-radius:6px;width:100%;box-sizing:border-box}
  .row{display:flex;gap:12px}
  .col{flex:1}
  .small{width:120px}
  footer{padding:12px;text-align:center;color:var(--muted);font-size:13px}
  .flex{display:flex;gap:8px;align-items:center}
  .note{font-size:13px;color:#444}
  .tiny{font-size:12px;color:var(--muted)}
  .linklike{background:transparent;border:0;color:var(--accent);cursor:pointer;text-decoration:underline;padding:0}
</style>
</head>
<body>
<header>
  <h1>Salon ERP — Himayatnagar, TG</h1>
  <div class="muted">Local time: <span id="localTime"></span></div>
  <div style="margin-left:auto" class="flex">
    <button class="btn" id="exportBtn">Export JSON</button>
    <input type="file" id="importFile" style="display:none" />
    <button class="btn" id="importBtn" style="background:#444">Import</button>
  </div>
</header>

<div class="container">
  <nav>
    <div class="menu">
      <button data-view="dashboard">Dashboard</button>
      <button data-view="clients">Clients</button>
      <button data-view="appointments">Appointments</button>
      <button data-view="inventory">Inventory / Services</button>
      <button data-view="staff">Staff</button>
      <button data-view="pos">POS / Billing</button>
      <button data-view="reminders">Reminders (UPI)</button>
      <button data-view="reports">Reports</button>
    </div>
  </nav>

  <main id="app"></main>
</div>

<footer>Salon ERP — single-file demo • Data stored locally in your browser</footer>

<script>
/* ---------- Utilities & Storage ---------- */
const STORE_KEY='salon_erp_v1';
document.getElementById('localTime').textContent = new Date().toLocaleString();

function loadStore(){
  const raw=localStorage.getItem(STORE_KEY);
  if(!raw) return {clients:[],appointments:[],inventory:[],staff:[],sales:[],reminders:[]};
  try{return JSON.parse(raw)}catch(e){return {clients:[],appointments:[],inventory:[],staff:[],sales:[],reminders:[]}}
}
function saveStore(s){localStorage.setItem(STORE_KEY,JSON.stringify(s))}

let store = loadStore();

/* ---------- Router ---------- */
const app = document.getElementById('app');
function render(view){ if(view==='dashboard') return renderDashboard();
  if(view==='clients') return renderClients();
  if(view==='appointments') return renderAppointments();
  if(view==='inventory') return renderInventory();
  if(view==='staff') return renderStaff();
  if(view==='pos') return renderPOS();
  if(view==='reminders') return renderReminders();
  if(view==='reports') return renderReports();
}
document.querySelectorAll('nav .menu button').forEach(b=>{
  b.addEventListener('click',()=>{render(b.dataset.view)})
});
render('dashboard');

/* ---------- Helpers ---------- */
function findClientName(id){ const c = store.clients.find(x=>x.id==id); return c?c.name:'Walk-in'; }
function addSaleFromPayment(clientId, items, total){
  store.sales.push({id:Date.now().toString(),clientId,items,total,date:new Date().toISOString()});
  saveStore(store);
}

/* ---------- Dashboard ---------- */
function renderDashboard(){
  app.innerHTML = `
    <div class="card"><h2>Dashboard</h2>
      <div class="row">
        <div class="col card"><strong>Clients</strong><div class="muted">${store.clients.length}</div></div>
        <div class="col card"><strong>Appointments</strong><div class="muted">${store.appointments.length}</div></div>
        <div class="col card"><strong>Inventory Items</strong><div class="muted">${store.inventory.length}</div></div>
        <div class="col card"><strong>Sales</strong><div class="muted">${store.sales.length} bills</div></div>
      </div>
    </div>
    <div class="card"><h3>Due Reminders (next 7 days)</h3><div id="dueReminders"></div></div>
  `;
  drawDueReminders();
}
function drawDueReminders(){
  const el = document.getElementById('dueReminders');
  const now = new Date();
  const soon = new Date(); soon.setDate(soon.getDate()+7);
  const due = store.reminders.filter(r=> new Date(r.nextDue) <= soon).sort((a,b)=>new Date(a.nextDue)-new Date(b.nextDue));
  if(!due.length) el.innerHTML = '<div class="muted">No upcoming reminders</div>';
  else{
    el.innerHTML = '<table><thead><tr><th>When</th><th>Client</th><th>Amount</th><th></th></tr></thead><tbody>' +
      due.map(r=>`<tr><td>${new Date(r.nextDue).toLocaleDateString()}</td><td>${findClientName(r.clientId)}</td><td>₹${r.amount}</td><td><button class="btn small" onclick="openReminder(${r.id})">Open</button></td></tr>`).join('') +
      '</tbody></table>';
  }
}

/* ---------- Clients ---------- */
function renderClients(){
  app.innerHTML = `
    <div class="card"><h2>Clients</h2>
      <div class="row"><div class="col"><input id="clientSearch" placeholder="Search by name or phone" /></div>
      <div><button class="btn" id="addClientBtn">Add Client</button></div></div>
      <div id="clientsList"></div>
    </div>
  `;
  document.getElementById('addClientBtn').onclick = ()=>openClientForm();
  document.getElementById('clientSearch').oninput = ()=>drawClients();
  drawClients();
}
function drawClients(){
  const q = document.getElementById('clientSearch').value?.toLowerCase()||'';
  const list = store.clients.filter(c=> (c.name+c.phone+c.email).toLowerCase().includes(q));
  const el = document.getElementById('clientsList');
  if(!list.length) el.innerHTML='<div class="muted card">No clients</div>';
  else{
    el.innerHTML = '<table><thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>UPI ID</th><th></th></tr></thead><tbody>' +
      list.map((c,i)=>`<tr><td>${c.name}</td><td>${c.phone||''}</td><td>${c.email||''}</td><td>${c.upi||''}</td><td><button class="btn small" onclick="editClientById('${c.id}')">Edit</button></td></tr>`).join('') +
      '</tbody></table>';
  }
}
window.editClientById = function(id){
  const idx = store.clients.findIndex(c=>c.id==id);
  if(idx>=0) openClientForm(store.clients[idx], idx);
}
function openClientForm(client=null,index=null){
  const name = client?client.name:'';
  const phone = client?client.phone:'';
  const email = client?client.email:'';
  const upi = client?client.upi||'':'';
  app.innerHTML = `
    <div class="card"><h2>${client?'Edit':'Add'} Client</h2>
      <div class="row"><div class="col"><label>Name</label><input id="cname" value="${name}" /></div>
      <div class="col"><label>Phone</label><input id="cphone" value="${phone}" /></div></div>
      <div class="row"><div class="col"><label>Email</label><input id="cemail" value="${email}" /></div><div class="col"><label>UPI ID (e.g. name@bank)</label><input id="cupi" value="${upi}" /></div></div>
      <div style="margin-top:10px"><button class="btn" id="saveClient">Save</button> <button id="cancel" class="btn" style="background:#888">Cancel</button></div>
    </div>
  `;
  document.getElementById('cancel').onclick = ()=>render('clients');
  document.getElementById('saveClient').onclick = ()=>{
    const obj = {name:document.getElementById('cname').value,phone:document.getElementById('cphone').value,email:document.getElementById('cemail').value, upi:document.getElementById('cupi').value, id: client?client.id:Date.now().toString()};
    if(index==null) store.clients.push(obj); else store.clients[index]=obj;
    saveStore(store); render('clients');
  }
}

/* ---------- Appointments (with inline add) ---------- */
function renderAppointments(){
  app.innerHTML = `
    <div class="card"><h2>Appointments</h2>
      <div class="row">
        <div class="col">
          <label>Select Client</label>
          <select id="apClient"><option value="">-- choose --</option>${store.clients.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select>
          <div class="muted">Or add new below</div>
          <input id="apClientNew" placeholder="New client name (optional)" />
        </div>
        <div class="col">
          <label>Select Service</label>
          <select id="apService"><option value="">-- choose --</option>${store.inventory.map(i=>`<option value="${i.id}">${i.name} - ₹${i.price}</option>`).join('')}</select>
          <div class="muted">Or add new below</div>
          <input id="apServiceNew" placeholder="New service name (optional)" />
          <input id="apServicePrice" placeholder="Price for new service" style="margin-top:6px" />
        </div>
      </div>

      <div class="row" style="margin-top:8px">
        <div class="col"><label>Date and time</label><input type="datetime-local" id="apDate" /></div>
        <div class="col"><label>Staff</label><select id="apStaff"><option value="">Unassigned</option>${store.staff.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select></div>
      </div>

      <div style="margin-top:10px"><button class="btn" id="saveAp">Save Appointment</button></div>
      <div id="apList" style="margin-top:12px"></div>
    </div>
  `;

  document.getElementById('saveAp').onclick = ()=>{
    let clientId = document.getElementById('apClient').value;
    const clientNew = document.getElementById('apClientNew').value.trim();
    let serviceId = document.getElementById('apService').value;
    const serviceNew = document.getElementById('apServiceNew').value.trim();
    const servicePrice = parseFloat(document.getElementById('apServicePrice').value) || 0;
    const dt = document.getElementById('apDate').value;
    const staffId = document.getElementById('apStaff').value;

    if(!dt){ alert('Please select date and time'); return; }

    if(!clientId && clientNew){
      const newClient = { id: 'c' + Date.now(), name: clientNew, phone:'', email:'', upi:'' };
      store.clients.push(newClient);
      clientId = newClient.id;
    }

    if(!serviceId && serviceNew){
      const newService = { id: 'i' + Date.now(), name: serviceNew, price: servicePrice, qty: 9999 };
      store.inventory.push(newService);
      serviceId = newService.id;
    }

    if(!clientId || !serviceId){ alert('Select or add client and service'); return; }

    const client = store.clients.find(c=>c.id==clientId);
    const service = store.inventory.find(i=>i.id==serviceId);
    const staff = store.staff.find(s=>s.id==staffId) || {};

    store.appointments.push({
      id: Date.now().toString(),
      clientId,
      clientName: client ? client.name : clientNew,
      service: service ? service.name : serviceNew,
      serviceId,
      staffId,
      staffName: staff.name || '',
      datetime: dt,
      status: 'scheduled'
    });

    saveStore(store);
    renderAppointments();
  };

  drawApList();
}
function drawApList(){
  const el = document.getElementById('apList');
  if(!store.appointments.length) el.innerHTML='<div class="muted">No appointments</div>';
  else{
    el.innerHTML = '<table><thead><tr><th>When</th><th>Client</th><th>Service</th><th>Staff</th><th>Status</th><th></th></tr></thead><tbody>' +
      store.appointments.map((a,i)=>`<tr><td>${new Date(a.datetime).toLocaleString()}</td><td>${a.clientName}</td><td>${a.service}</td><td>${a.staffName||'-'}</td><td>${a.status}</td><td><button class="btn small" onclick="completeAp(${i})">Complete</button></td></tr>`).join('') +
      '</tbody></table>';
  }
}
window.completeAp = function(i){
  const ap = store.appointments[i];
  ap.status='completed';
  saveStore(store);
  render('appointments');
}

/* ---------- Inventory ---------- */
function renderInventory(){
  app.innerHTML = `
    <div class="card"><h2>Inventory / Services</h2>
      <div class="row"><div class="col"><input id="invName" placeholder="Service or product name" /></div>
      <div class="col small"><input id="invPrice" placeholder="Price" /></div>
      <div class="col small"><input id="invQty" placeholder="Qty" /></div>
      <div><button class="btn" id="addInv">Add</button></div></div>
      <div id="invList" style="margin-top:12px"></div>
    </div>
  `;
  document.getElementById('addInv').onclick = ()=>{
    const name=document.getElementById('invName').value;
    const price=parseFloat(document.getElementById('invPrice').value)||0;
    const qty=parseInt(document.getElementById('invQty').value)||0;
    if(!name){alert('Name required');return;}
    store.inventory.push({id:Date.now().toString(),name,price,qty});
    saveStore(store); renderInventory();
  }
  drawInv();
}
function drawInv(){
  const el=document.getElementById('invList');
  if(!store.inventory.length) el.innerHTML='<div class="muted">No items</div>';
  else{
    el.innerHTML = '<table><thead><tr><th>Name</th><th>Price</th><th>Qty</th><th></th></tr></thead><tbody>' +
      store.inventory.map((it,i)=>`<tr><td>${it.name}</td><td>₹${it.price}</td><td>${it.qty}</td><td><button class="btn small" onclick="sellItem(${i})">Sell</button></td></tr>`).join('') +
      '</tbody></table>';
  }
}
window.sellItem = function(i){
  const it = store.inventory[i];
  if(it.qty<=0){alert('Out of stock');return;}
  const qty = parseInt(prompt('Quantity to sell',1));
  if(!qty||qty<1) return;
  it.qty -= qty;
  store.sales.push({id:Date.now().toString(),items:[{id:it.id,name:it.name,price:it.price,qty}],total:it.price*qty,date:new Date().toISOString()});
  saveStore(store); renderInventory();
}

/* ---------- Staff ---------- */
function renderStaff(){
  app.innerHTML = `
    <div class="card"><h2>Staff</h2>
      <div class="row"><div class="col"><input id="sname" placeholder="Name" /></div><div><button class="btn" id="addStaff">Add</button></div></div>
      <div id="staffList" style="margin-top:12px"></div>
    </div>
  `;
  document.getElementById('addStaff').onclick = ()=>{
    const name=document.getElementById('sname').value;
    if(!name) return;
    store.staff.push({id:Date.now().toString(),name});
    saveStore(store); renderStaff();
  }
  drawStaff();
}
function drawStaff(){
  const el=document.getElementById('staffList');
  if(!store.staff.length) el.innerHTML='<div class="muted">No staff</div>';
  else el.innerHTML = '<ul>' + store.staff.map(s=>`<li>${s.name}</li>`).join('') + '</ul>';
}

/* ---------- POS / Billing (UPI link in receipt) ---------- */
function renderPOS(){
  app.innerHTML = `
    <div class="card"><h2>POS / Billing</h2>
      <div class="row"><div class="col"><select id="posClient"><option value="">Walk-in</option>${store.clients.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select></div>
      <div class="col"><select id="posItem">${store.inventory.map(i=>`<option value="${i.id}">${i.name} - ₹${i.price} (${i.qty})</option>`).join('')}</select></div>
      <div class="col small"><input id="posQty" type="number" value="1" /></div>
      <div><button class="btn" id="addToCart">Add</button></div></div>
      <div id="cart" style="margin-top:12px"></div>
    </div>
  `;
  window.cart = [];
  document.getElementById('addToCart').onclick = ()=>{
    const id=document.getElementById('posItem').value;
    const qty=parseInt(document.getElementById('posQty').value)||1;
    const it = store.inventory.find(x=>x.id==id);
    if(!it){alert('Select item');return;}
    if(it.qty < qty){alert('Insufficient stock');return;}
    cart.push({id:it.id,name:it.name,price:it.price,qty});
    drawCart();
  }
  function drawCart(){
    const el=document.getElementById('cart');
    if(!cart.length) el.innerHTML='<div class="muted">Cart empty</div>';
    else{
      const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
      el.innerHTML = '<table><thead><tr><th>Item</th><th>Qty</th><th>Price</th></tr></thead><tbody>' +
        cart.map((c,i)=>`<tr><td>${c.name}</td><td>${c.qty}</td><td>₹${c.price*c.qty}</td></tr>`).join('') +
        `</tbody></table><div style="margin-top:8px"><strong>Total: ₹${total}</strong> <button class="btn" id="payBtn">Pay</button></div>`;
      document.getElementById('payBtn').onclick = ()=>completeSale(total);
    }
  }
  function completeSale(total){
    if(!confirm('Complete sale for ₹'+total+'?')) return;
    // reduce stock
    cart.forEach(ci=>{
      const it = store.inventory.find(x=>x.id==ci.id);
      if(it) it.qty -= ci.qty;
    });
    const clientId = document.getElementById('posClient').value||null;
    const bill = {id:Date.now().toString(),clientId,items:cart,total,date:new Date().toISOString()};
    store.sales.push(bill);
    saveStore(store);
    // Build UPI link if client has UPI
    const client = store.clients.find(c=>c.id==clientId);
    let upiLink = '';
    if(client && client.upi){
      upiLink = buildUpiLink(client.upi, client.name || 'Client', total, 'Salon payment');
    }
    // Show receipt with UPI link if available
    const receiptHtml = `<div><h3>Receipt</h3><div><strong>Total: ₹${total}</strong></div>
      <div class="muted">Items:<pre>${cart.map(i=>`${i.name} x${i.qty} = ₹${i.price*i.qty}`).join('\n')}</pre></div>
      ${upiLink ? `<div><strong>Pay via UPI:</strong><div><a href="${upiLink}" target="_blank" class="btn">Pay ₹${total} (Open UPI)</a></div>
        <div style="margin-top:6px"><button class="btn" id="copyUpi">Copy UPI link/ID</button> <span class="tiny">or share UPI ID: <strong>${client.upi}</strong></span></div></div>` : '<div class="muted">No UPI ID for client</div>'}
      </div>`;
    const w = window.open('','_blank'); w.document.write(receiptHtml);
    // copy handler in new window not possible from here; provide copy in main UI instead
    alert('Sale recorded. Receipt opened in new tab.');
    cart = []; render('pos');
  }
}

/* ---------- Reminders (monthly UPI payment reminders) ---------- */
function renderReminders(){
  app.innerHTML = `
    <div class="card"><h2>Reminders (Monthly UPI)</h2>
      <div class="row">
        <div class="col"><label>Client</label><select id="remClient"><option value="">-- choose client --</option>${store.clients.map(c=>`<option value="${c.id}">${c.name} (${c.upi||'no UPI'})</option>`).join('')}</select></div>
        <div class="col small"><label>Amount (₹)</label><input id="remAmount" type="number" /></div>
        <div class="col small"><label>Next due</label><input id="remNext" type="date" /></div>
        <div><label>&nbsp;</label><button class="btn" id="addRem">Add</button></div>
      </div>
      <div style="margin-top:10px"><small class="muted">Reminders will appear here. When due, you can send a UPI request or mark paid.</small></div>
      <div id="remList" style="margin-top:12px"></div>
    </div>
  `;
  document.getElementById('addRem').onclick = ()=>{
    const clientId = document.getElementById('remClient').value;
    const amount = parseFloat(document.getElementById('remAmount').value)||0;
    const next = document.getElementById('remNext').value;
    if(!clientId || !amount || !next){ alert('Select client, amount and next due date'); return; }
    store.reminders.push({id:Date.now().toString(),clientId,amount,nextDue:new Date(next).toISOString(),note:'Monthly payment',active:true});
    saveStore(store); renderReminders();
  }
  drawReminders();
}
function drawReminders(){
  const el = document.getElementById('remList');
  if(!store.reminders.length) el.innerHTML = '<div class="muted">No reminders</div>';
  else{
    el.innerHTML = '<table><thead><tr><th>Client</th><th>Next Due</th><th>Amount</th><th>Status</th><th></th></tr></thead><tbody>' +
      store.reminders.map((r,i)=>`<tr><td>${findClientName(r.clientId)}</td><td>${new Date(r.nextDue).toLocaleDateString()}</td><td>₹${r.amount}</td><td>${r.active? 'Active':'Paused'}</td>
        <td>
          <button class="btn small" onclick="sendUpiRequest('${r.id}')">Send UPI</button>
          <button class="btn small" style="background:#4caf50" onclick="markReminderPaid('${r.id}')">Mark paid</button>
          <button class="btn small" style="background:#888" onclick="toggleReminder('${r.id}')">${r.active? 'Pause':'Resume'}</button>
        </td></tr>`).join('') +
      '</tbody></table>';
  }
}

/* Build UPI deep link */
function buildUpiLink(upiId, name, amount, note){
  const pa = encodeURIComponent(upiId);
  const pn = encodeURIComponent(name);
  const am = encodeURIComponent(amount.toFixed(2));
  const tn = encodeURIComponent(note || '');
  return `upi://pay?pa=${pa}&pn=${pn}&am=${am}&tn=${tn}&cu=INR`;
}

/* Send UPI request: open link and copy to clipboard */
window.sendUpiRequest = function(remId){
  const rem = store.reminders.find(r=>r.id==remId);
  if(!rem) return alert('Reminder not found');
  const client = store.clients.find(c=>c.id==rem.clientId);
  if(!client || !client.upi) return alert('Client has no UPI ID saved. Edit client to add UPI ID.');
  const link = buildUpiLink(client.upi, client.name || 'Client', rem.amount, rem.note);
  // open link (mobile will open UPI app)
  window.open(link,'_blank');
  // copy link and upi id to clipboard
  navigator.clipboard?.writeText(`${link}\nUPI ID: ${client.upi}`).then(()=>alert('UPI link and ID copied to clipboard'), ()=>alert('UPI link opened; copy manually: ' + client.upi));
}

/* Mark reminder paid: record sale and advance nextDue by 1 month */
window.markReminderPaid = function(remId){
  const rem = store.reminders.find(r=>r.id==remId);
  if(!rem) return alert('Reminder not found');
  const client = store.clients.find(c=>c.id==rem.clientId);
  // create a sale record with a single item "Monthly payment"
  const item = {id:'rem-'+rem.id,name:'Monthly payment',price:rem.amount,qty:1};
  addSaleFromPayment(rem.clientId,[item],rem.amount);
  // advance nextDue by one month
  const d = new Date(rem.nextDue);
  const next = new Date(d.getFullYear(), d.getMonth()+1, d.getDate());
  rem.nextDue = next.toISOString();
  saveStore(store);
  alert('Marked paid and advanced next due to ' + next.toLocaleDateString());
  render('reminders');
}

/* Toggle reminder active */
window.toggleReminder = function(remId){
  const rem = store.reminders.find(r=>r.id==remId);
  if(!rem) return;
  rem.active = !rem.active;
  saveStore(store);
  render('reminders');
}

/* ---------- Reports ---------- */
function renderReports(){
  app.innerHTML = `
    <div class="card"><h2>Reports</h2>
      <div class="row"><div class="col"><label>From</label><input type="date" id="rfrom" /></div><div class="col"><label>To</label><input type="date" id="rto" /></div><div><button class="btn" id="runReport">Run</button></div></div>
      <div id="reportArea" style="margin-top:12px"></div>
    </div>
  `;
  document.getElementById('runReport').onclick = ()=>{
    const from = document.getElementById('rfrom').value ? new Date(document.getElementById('rfrom').value) : new Date(0);
    const to = document.getElementById('rto').value ? new Date(document.getElementById('rto').value+'T23:59:59') : new Date();
    const sales = store.sales.filter(s=> new Date(s.date) >= from && new Date(s.date) <= to);
    const total = sales.reduce((s,x)=>s+x.total,0);
    const items = {};
    sales.forEach(s=> s.items.forEach(it=> { items[it.name] = (items[it.name]||0) + it.qty }));
    document.getElementById('reportArea').innerHTML = `<div class="card"><strong>Total Sales:</strong> ₹${total} <div class="muted">${sales.length} bills</div></div>
      <div class="card"><h4>Top items</h4><ul>${Object.entries(items).sort((a,b)=>b[1]-a[1]).map(e=>`<li>${e[0]} — ${e[1]}</li>`).join('')}</ul></div>`;
  }
}

/* ---------- Export / Import ---------- */
document.getElementById('exportBtn').onclick = ()=>{
  const data = JSON.stringify(store, null, 2);
  const blob = new Blob([data],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='salon-erp-backup.json'; a.click(); URL.revokeObjectURL(url);
}
document.getElementById('importBtn').onclick = ()=>document.getElementById('importFile').click();
document.getElementById('importFile').onchange = (e)=>{
  const f = e.target.files[0]; if(!f) return;
  const reader = new FileReader(); reader.onload = ()=>{ try{ store = JSON.parse(reader.result); saveStore(store); alert('Imported'); render('dashboard'); }catch(err){alert('Invalid file')} };
  reader.readAsText(f);
}

/* ---------- Reminder checker & Notifications ---------- */
function checkRemindersOnLoad(){
  // ask for notification permission if not decided
  if("Notification" in window && Notification.permission === "default"){
    Notification.requestPermission();
  }
  const now = new Date();
  const due = store.reminders.filter(r=> r.active && new Date(r.nextDue) <= now);
  if(due.length){
    due.forEach(r=>{
      const client = store.clients.find(c=>c.id==r.clientId);
      const title = `Payment due: ${client?client.name:'Client'}`;
      const body = `₹${r.amount} due today. Tap to send UPI request.`;
      if("Notification" in window && Notification.permission === "granted"){
        const n = new Notification(title, {body});
        n.onclick = ()=>{ window.focus(); render('reminders'); };
      } else {
        // fallback: show alert and render reminders
        console.log('Reminder due:', title, body);
      }
    });
    // show reminders view so user can act
    render('reminders');
  }
}
// run on load
checkRemindersOnLoad();
